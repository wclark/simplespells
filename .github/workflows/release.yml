name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "refs/tags/${{ steps.release.outputs.tag }}"

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release jar
        run: ./gradlew --no-daemon clean build jacocoTestReport

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          Built for:
          - Minecraft 1.21.1
          - NeoForge 21.1.219

          Download `simplespells.jar` and place it in your Minecraft instance's `mods` folder.
          EOF

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" build/libs/simplespells.jar --clobber
          else
            gh release create "${RELEASE_TAG}" build/libs/simplespells.jar \
              --title "Simple Spells ${RELEASE_TAG}" \
              --notes-file release-notes.md \
              --verify-tag
          fi
